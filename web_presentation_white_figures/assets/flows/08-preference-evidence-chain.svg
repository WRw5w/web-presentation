<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 560" role="img" aria-labelledby="title desc">
  <title id="title">偏好证据链</title>
  <desc id="desc">从二十六个任务的真实智能体轨迹，经筛选形成八百九十五个方案和一万八千四百三十八个带真实执行标签的方案对。</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#0f172a" flood-opacity=".08"/></filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#8291a5"/></marker>
    <style>
      text{font-family:"Microsoft YaHei UI","Microsoft YaHei",sans-serif;fill:#0f172a}
      .mono{font-family:"Cascadia Mono","Consolas",monospace;letter-spacing:1.5px}.small{font-size:14px}.body{font-size:16px}.title{font-size:20px;font-weight:700}.number{font-size:34px;font-weight:800}.muted{fill:#64748b}
      .line{fill:none;stroke:#8291a5;stroke-width:2}
    </style>
  </defs>

  <rect x="22" y="28" width="1396" height="500" rx="20" fill="#fbfcfe" stroke="#d8e0e9"/>
  <text x="54" y="65" class="mono small" fill="#0369a1">PROVENANCE FIRST · PREDICTION SECOND</text>
  <text x="1382" y="65" text-anchor="end" class="small muted">每一个偏好标签都由真实执行结果锚定</text>

  <path d="M184 216H230" class="line" marker-end="url(#arrow)"/>
  <path d="M394 216H440" class="line" marker-end="url(#arrow)"/>
  <path d="M626 216H672" class="line" marker-end="url(#arrow)"/>
  <path d="M820 216H866" class="line" marker-end="url(#arrow)"/>
  <path d="M1076 216H1122" class="line" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="48" y="142" width="136" height="148" rx="16" fill="#f4faff" stroke="#90c8e2"/>
    <rect x="48" y="142" width="136" height="7" rx="3" fill="#0369a1"/>
  </g>
  <text x="116" y="188" text-anchor="middle" class="number" fill="#0369a1">26</text>
  <text x="116" y="222" text-anchor="middle" class="title">MLE-bench 任务</text>
  <text x="116" y="252" text-anchor="middle" class="small muted">AIDE + AutoMind</text>

  <g filter="url(#shadow)">
    <rect x="230" y="142" width="164" height="148" rx="16" fill="#ffffff" stroke="#cbd5e1"/>
  </g>
  <text x="312" y="188" text-anchor="middle" class="number">1,329</text>
  <text x="312" y="222" text-anchor="middle" class="title">有效方案</text>
  <text x="312" y="252" text-anchor="middle" class="small muted">完整可执行 workflow</text>

  <g filter="url(#shadow)">
    <rect x="440" y="126" width="186" height="180" rx="16" fill="#fffbf1" stroke="#d9bd7d"/>
    <rect x="440" y="126" width="186" height="7" rx="3" fill="#c3922f"/>
  </g>
  <text x="533" y="172" text-anchor="middle" class="mono small" fill="#a16207">QUALITY CONTROL</text>
  <text x="533" y="210" text-anchor="middle" class="title">专家剪枝与去重</text>
  <text x="533" y="241" text-anchor="middle" class="small muted">去除无效 / 重复方案</text>
  <text x="533" y="268" text-anchor="middle" class="small muted">控制算法与分数多样性</text>

  <g filter="url(#shadow)">
    <rect x="672" y="142" width="148" height="148" rx="16" fill="#faf8ff" stroke="#b9aff0"/>
    <rect x="672" y="142" width="148" height="7" rx="3" fill="#6d5bd0"/>
  </g>
  <text x="746" y="188" text-anchor="middle" class="number" fill="#6d5bd0">895</text>
  <text x="746" y="222" text-anchor="middle" class="title">筛选后方案</text>
  <text x="746" y="252" text-anchor="middle" class="small muted">保留真实差异</text>

  <g filter="url(#shadow)">
    <rect x="866" y="126" width="210" height="180" rx="16" fill="#f4fcf8" stroke="#8bcbb5"/>
    <rect x="866" y="126" width="210" height="7" rx="3" fill="#047857"/>
  </g>
  <text x="971" y="178" text-anchor="middle" class="number" fill="#047857">18,438</text>
  <text x="971" y="216" text-anchor="middle" class="title">带标签方案对</text>
  <text x="971" y="248" text-anchor="middle" class="small muted">标签 = 真实执行指标优劣</text>
  <text x="971" y="274" text-anchor="middle" class="small muted">不是模型自评</text>

  <g filter="url(#shadow)">
    <rect x="1122" y="142" width="270" height="148" rx="16" fill="#fff7f8" stroke="#e5a5b5"/>
    <rect x="1122" y="142" width="270" height="7" rx="3" fill="#be123c"/>
  </g>
  <text x="1257" y="184" text-anchor="middle" class="mono small" fill="#be123c">PAIRWISE BENCHMARK</text>
  <text x="1257" y="222" text-anchor="middle" class="title">World Model 只能看输入</text>
  <text x="1257" y="252" text-anchor="middle" class="small muted">任务 + 报告 + 两个方案</text>

  <path d="M116 290V352H1257V290" class="line"/>
  <circle cx="116" cy="352" r="5" fill="#0369a1"/><circle cx="1257" cy="352" r="5" fill="#be123c"/>

  <rect x="70" y="374" width="616" height="116" rx="16" fill="#ffffff" stroke="#cbd5e1"/>
  <rect x="70" y="374" width="8" height="116" rx="4" fill="#047857"/>
  <text x="100" y="408" class="mono small" fill="#047857">TRUSTED FACTS</text>
  <text x="100" y="440" class="title">数据分析代码真实执行 → 专家核验日志 → 数值事实</text>
  <text x="100" y="470" class="small muted">先得到可追溯事实，再把事实提供给语言模型</text>

  <path d="M686 432H752" class="line" marker-end="url(#arrow)"/>

  <rect x="752" y="374" width="616" height="116" rx="16" fill="#faf8ff" stroke="#b9aff0"/>
  <rect x="752" y="374" width="8" height="116" rx="4" fill="#6d5bd0"/>
  <text x="782" y="408" class="mono small" fill="#6d5bd0">ALIGNED SEMANTICS</text>
  <text x="782" y="440" class="title">数值事实语言化 → 与当前任务和代码严格对齐</text>
  <text x="782" y="470" class="small muted">模型负责推理，不负责制造标签或改写执行事实</text>
</svg>
